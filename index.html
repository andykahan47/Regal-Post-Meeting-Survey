<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Customer Meeting Report</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --border: #E2E0D8;
    --border-focus: #4A4A8A;
    --text: #1A1A2E;
    --text-muted: #6B6B80;
    --text-hint: #A0A0B0;
    --accent: #4A4A8A;
    --accent-light: #EEEEF8;
    --accent-hover: #38387A;
    --success-bg: #EAF5EE;
    --success-border: #4CAF78;
    --success-text: #1E6B3C;
    --error-bg: #FEF0EE;
    --error-border: #E05C44;
    --error-text: #8C2A18;
    --tag-bg: #EEEEF8;
    --tag-text: #38387A;
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
    line-height: 1.6;
  }

  .page-header {
    max-width: 720px;
    margin: 0 auto 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .page-header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .page-header p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 3px;
  }



  /* Form */
  form { max-width: 720px; margin: 0 auto; }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 1.25rem;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .grid { display: grid; gap: 16px; }
  .grid.two { grid-template-columns: 1fr 1fr; }
  @media (max-width: 560px) { .grid.two { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 13px; font-weight: 500; color: var(--text); }
  .field .hint { font-size: 12px; color: var(--text-hint); }

  .field input, .field select, .field textarea {
    padding: 9px 13px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    transition: border-color 0.15s, box-shadow 0.15s;
    width: 100%;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(74,74,138,0.1);
  }
  .field textarea { resize: vertical; min-height: 88px; line-height: 1.6; }

  .pill-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 99px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-muted);
    background: var(--surface);
    transition: all 0.12s;
    user-select: none;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .pill.on { border-color: var(--accent); color: var(--tag-text); background: var(--tag-bg); font-weight: 500; }

  .submit-area { max-width: 720px; margin: 0 auto; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

  .btn-submit {
    padding: 12px 32px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: -0.01em;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-submit:hover { background: var(--accent-hover); }
  .btn-submit:active { transform: scale(0.98); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-copy {
    padding: 11px 20px;
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.12s;
  }
  .btn-copy:hover { border-color: var(--accent); color: var(--accent); }

  .banner {
    max-width: 720px; margin: 1rem auto 0;
    padding: 13px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    display: none;
  }
  .banner.success { background: var(--success-bg); border: 1px solid var(--success-border); color: var(--success-text); }
  .banner.error { background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-text); }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

          <div class="pill" onclick="selectPill('sentiment-group',this)">Very positive</div>
          <div class="pill" onclick="selectPill('sentiment-group',this)">Positive</div>
          <div class="pill" onclick="selectPill('sentiment-group',this)">Neutral</div>
          <div class="pill" onclick="selectPill('sentiment-group',this)">Lukewarm</div>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Products &amp; patterns</div>
    <div class="grid">
      <div class="field">
        <label for="liked">Which patterns or products did they like?</label>
        <textarea id="liked" placeholder="Specific patterns, colorways, or collections they responded well to..."></textarea>
      </div>
      <div class="field">
        <label for="disliked">What did they not like?</label>
        <textarea id="disliked" placeholder="Patterns, qualities, or features they pushed back on..."></textarea>
      </div>
      <div class="field">
        <label for="gaps">Styles, colors, or qualities we aren't currently providing?</label>
        <textarea id="gaps" placeholder="e.g. 'Looking for more earth tones', 'Needs a heavier weight linen', 'Wants subtle texture'..."></textarea>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Business &amp; pipeline</div>
    <div class="grid">
      <div class="field">
        <label for="biz-health">How is their business doing overall?</label>
        <textarea id="biz-health" placeholder="Busy season, slow period, expanding, downsizing? General business health..."></textarea>
      </div>
      <div class="field">
        <label for="current-projects">What projects are they working on right now?</label>
        <textarea id="current-projects" placeholder="Active jobs, installs in progress, current client work..."></textarea>
      </div>
      <div class="field">
        <label for="future-projects">What projects are they thinking about for the future?</label>
        <textarea id="future-projects" placeholder="Pipeline, bids they're working on, future client needs..."></textarea>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Samples &amp; follow-up</div>
    <div class="grid">
      <div class="field">
        <label>Samples requested &amp; submitted to Regal?</label>
        <div style="display:flex; flex-direction:column; gap:10px; margin-top:4px;">
          <div style="display:flex; align-items:center; gap:12px;">
            <span style="font-size:13px; color:var(--text-muted); min-width:140px;">Samples requested?</span>
            <div class="pill-group" id="samples-requested-group">
              <div class="pill" onclick="selectPill('samples-requested-group',this)">Yes</div>
              <div class="pill" onclick="selectPill('samples-requested-group',this)">No</div>
            </div>
          </div>
          <div style="display:flex; align-items:center; gap:12px;">
            <span style="font-size:13px; color:var(--text-muted); min-width:140px;">Submitted to Regal?</span>
            <div class="pill-group" id="samples-submitted-group">
              <div class="pill" onclick="selectPill('samples-submitted-group',this)">Yes</div>
              <div class="pill" onclick="selectPill('samples-submitted-group',this)">No</div>
            </div>
          </div>
        </div>
      </div>
      <div class="field">
        <label for="follow-up">Follow-up actions needed</label>
        <textarea id="follow-up" placeholder="e.g. 'Send pricing on Collection X', 'Follow up in 2 weeks'..." style="min-height:72px;"></textarea>
      </div>
      <div class="field">
        <label for="notes">Anything else worth noting?</label>
        <textarea id="notes" placeholder="Competitive intel, relationship notes, surprises, anything unusual..." style="min-height:72px;"></textarea>
      </div>
    </div>
  </div>

  <div class="submit-area">
    <button class="btn-submit" id="submit-btn" onclick="submitForm()">Submit to Google Sheets</button>
    <button class="btn-copy" type="button" onclick="copyAsText()">Copy as text</button>
  </div>
  <div class="banner" id="banner"></div>

</form>

<script>
  // ── Config ──────────────────────────────────────────────────────────────
  const sheetUrl = 'https://script.google.com/macros/s/AKfycbzI90pMfQI_qay_25mBOsqeIuHtTf7iagjB7g6Ls41tthbS2Z5_1LHkrE_J_kD8clO21Q/exec';

  // ── Pills ────────────────────────────────────────────────────────────────
  function selectPill(groupId, el) {
    document.getElementById(groupId).querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
    el.classList.add('on');
  }

  function getPill(groupId) {
    const on = document.getElementById(groupId).querySelector('.pill.on');
    return on ? on.textContent : '';
  }

  // ── Data ─────────────────────────────────────────────────────────────────
  function gv(id) { return (document.getElementById(id)?.value || '').trim(); }

  function buildPayload() {
    return {
      timestamp: new Date().toLocaleString(),
      rep: gv('rep'),
      date: gv('date'),
      customer: gv('customer'),
      contacts: gv('contacts'),
      meetingType: document.getElementById('meeting-type').value,
      sentiment: getPill('sentiment-group'),
      liked: gv('liked'),
      disliked: gv('disliked'),
      gaps: gv('gaps'),
      bizHealth: gv('biz-health'),
      currentProjects: gv('current-projects'),
      futureProjects: gv('future-projects'),
      samples: (getPill('samples-requested-group') || '?') + ' / ' + (getPill('samples-submitted-group') || '?'),
      followUp: gv('follow-up'),
      notes: gv('notes'),
    };
  }

  // ── Submit ────────────────────────────────────────────────────────────────
  async function submitForm() {
    const rep = gv('rep');
    const customer = gv('customer');
    const date = gv('date');
    if (!rep || !customer || !date) {
      showBanner('Please fill in Rep Name, Customer, and Date before submitting.', 'error');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Submitting...';

    const payload = buildPayload();

    try {
      await fetch(sheetUrl, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      showBanner('✓ Report submitted! It should appear in your Google Sheet within a few seconds.', 'success');
      document.getElementById('survey').reset();
      document.querySelectorAll('.pill.on').forEach(p => p.classList.remove('on'));
      document.getElementById('date').valueAsDate = new Date();
    } catch (err) {
      showBanner('Something went wrong. Try "Copy as text" and paste into the sheet manually. Error: ' + err.message, 'error');
    }

    btn.disabled = false;
    btn.textContent = 'Submit to Google Sheets';
  }

  // ── Copy as text ──────────────────────────────────────────────────────────
  function copyAsText() {
    const d = buildPayload();
    const txt = [
      '=== CUSTOMER MEETING REPORT ===',
      'Submitted: ' + d.timestamp,
      '',
      'Rep: ' + d.rep,
      'Date: ' + d.date,
      'Customer: ' + d.customer,
      'Contacts: ' + d.contacts,
      'Meeting type: ' + d.meetingType,
      'Sentiment: ' + d.sentiment,
      '',
      '--- PRODUCTS & PATTERNS ---',
      'Liked: ' + d.liked,
      'Disliked: ' + d.disliked,
      'Gaps / requests: ' + d.gaps,
      '',
      '--- BUSINESS & PIPELINE ---',
      'Business health: ' + d.bizHealth,
      'Current projects: ' + d.currentProjects,
      'Future projects: ' + d.futureProjects,
      '',
      '--- SAMPLES & FOLLOW-UP ---',
      'Samples requested & submitted to Regal: ' + d.samples,
      'Follow-up actions: ' + d.followUp,
      'Additional notes: ' + d.notes,
    ].join('\n');
    navigator.clipboard.writeText(txt).catch(() => {});
    showBanner('Copied to clipboard! Paste anywhere you like.', 'success');
  }

  function showBanner(msg, type) {
    const b = document.getElementById('banner');
    b.textContent = msg;
    b.className = 'banner ' + type;
    b.style.display = 'block';
    if (type === 'success') setTimeout(() => b.style.display = 'none', 6000);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  document.getElementById('date').valueAsDate = new Date();
</script>
</body>
</html>
